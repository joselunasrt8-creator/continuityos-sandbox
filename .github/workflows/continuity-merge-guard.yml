name: continuity-merge-guard
# External-consumer install of ContinuityOS Merge Guard.
# Source: joselunasrt8-creator/ContinuityOS-/actions/continuity-merge-guard
# See VALIDATION.md for the adoption proof (Issue #1) and
# LOAD_BEARING_READINESS.md for the @v0.1.0 version strategy (Issue #5).
#
# TEMPORARY (Issue #9 / Loop 4 — Required Check Failure Enforcement Proof):
# `actor` is deliberately left empty below so the required `merge-guard`
# job emits result: NULL (missing_fields: ["actor"]) and fails closed,
# exercising the BLOCKED_NULL / required-check-failure path on this PR.
# This change must NOT be merged to main — see NULL_ENFORCEMENT_PROOF.md.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: read

jobs:
  merge-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: joselunasrt8-creator/ContinuityOS-/actions/continuity-merge-guard@v0.1.0
        id: merge-guard
        with:
          repo: ${{ github.repository }}
          pr-number: ${{ github.event.pull_request.number }}
          head-sha: ${{ github.event.pull_request.head.sha }}
          base-sha: ${{ github.event.pull_request.base.sha }}
          actor: ''
