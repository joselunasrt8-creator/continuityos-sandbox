name: continuity-merge-guard
# External-consumer install of ContinuityOS Merge Guard.
# Source: joselunasrt8-creator/ContinuityOS-/actions/continuity-merge-guard
# See VALIDATION.md for the adoption proof (Issue #1).

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: read

jobs:
  merge-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: joselunasrt8-creator/ContinuityOS-/actions/continuity-merge-guard@main
        id: merge-guard
        with:
          repo: ${{ github.repository }}
          pr-number: ${{ github.event.pull_request.number }}
          head-sha: ${{ github.event.pull_request.head.sha }}
          base-sha: ${{ github.event.pull_request.base.sha }}
          actor: ${{ github.event.pull_request.user.login }}
