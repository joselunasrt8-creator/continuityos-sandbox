name: continuity-merge-guard-null-check
# Manually-triggered exercise of the Merge Guard's fail-closed (NULL) path.
# Calls the same action as continuity-merge-guard.yml but with an empty
# `actor` input, so `result` is NULL and `missing_fields` includes "actor".
# See VALIDATION.md for the adoption proof (Issue #1).

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  merge-guard-null:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: joselunasrt8-creator/ContinuityOS-/actions/continuity-merge-guard@main
        id: merge-guard
        continue-on-error: true
        with:
          repo: ${{ github.repository }}
          pr-number: '0'
          head-sha: ${{ github.sha }}
          base-sha: ${{ github.sha }}
          actor: ''
